<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NWC → MusicXML Converter</title>
  <script src="./nwc-viewer/vendor/inflate.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .drop-zone {
      width: 100%;
      max-width: 520px;
      border: 2px dashed #333;
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #16161e;
      position: relative;
    }

    .drop-zone.drag-over {
      border-color: #7c6af7;
      background: #1a1830;
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .drop-zone p {
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .drop-zone strong {
      color: #e8e8f0;
    }

    #file-input {
      display: none;
    }

    .btn-select {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.5rem 1.2rem;
      background: #2a2a38;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-select:hover { background: #333345; }

    .result {
      width: 100%;
      max-width: 520px;
      margin-top: 1.2rem;
      background: #16161e;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-title {
      font-size: 0.8rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .file-info {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    .file-info .label { color: #666; }
    .file-info .value { color: #e8e8f0; word-break: break-all; }

    .btn-row {
      display: flex;
      gap: 0.6rem;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex: 1;
      padding: 0.7rem;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-download.xml  { background: #7c6af7; }
    .btn-download.xml:hover  { background: #6a59e0; }
    .btn-download.midi { background: #2e8b5e; }
    .btn-download.midi:hover { background: #257a52; }
    .btn-download.view { background: #c77d2e; }
    .btn-download.view:hover { background: #b06d24; }

    .viewer-link {
      margin-top: 1.4rem;
      font-size: 0.85rem;
      color: #888;
    }

    .viewer-link a {
      color: #a89cf9;
      text-decoration: none;
    }

    .viewer-link a:hover { text-decoration: underline; }

    .error {
      width: 100%;
      max-width: 520px;
      margin-top: 1.2rem;
      background: #1e1218;
      border: 1px solid #5a2030;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: #f08080;
      font-size: 0.88rem;
      display: none;
    }

    .error.visible { display: block; }

    .loading {
      display: none;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.2rem;
      color: #888;
      font-size: 0.88rem;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #444;
    }

    @media (max-width: 480px) {
      body { padding: 1.2rem; }
      h1 { font-size: 1.35rem; }
      .subtitle { margin-bottom: 1.8rem; }
      .drop-zone { padding: 2.2rem 1.2rem; }
      .result, .error { padding: 1rem 1.1rem; }
      .btn-row { flex-direction: column; }
      .btn-download { font-size: 0.85rem; padding: 0.75rem; }
      footer { margin-top: 2rem; text-align: center; }
    }
  </style>
</head>
<body>

  <h1>NWC Converter</h1>
  <p class="subtitle">NoteWorthy Composer 파일을 MusicXML 또는 MIDI로 변환합니다</p>

  <div class="drop-zone" id="drop-zone">
    <span class="drop-zone-icon">🎵</span>
    <p><strong>.nwc 파일을 여기에 드롭하세요</strong></p>
    <p>또는</p>
    <label class="btn-select" for="file-input">파일 선택</label>
    <input type="file" id="file-input" accept=".nwc,application/octet-stream,text/plain">
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    변환 중...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-title">변환 완료</div>
    <div class="file-info" id="file-info"></div>
    <div class="btn-row">
      <a class="btn-download xml"  id="download-xml"  href="#" download="">⬇ MusicXML (가사 포함)</a>
      <a class="btn-download midi" id="download-midi" href="#" download="">⬇ MIDI (가사 미지원)</a>
    </div>
    <div class="btn-row" style="margin-top: 0.6rem;">
      <a class="btn-download view" id="open-viewer" href="./nwc-viewer/index.html" target="_blank" rel="opener">🎼 악보 뷰어에서 보기</a>
    </div>
  </div>

  <p class="viewer-link">파일 없이 둘러보려면 <a href="./nwc-viewer/index.html" target="_blank" rel="opener">NWC Viewer</a>를 바로 열어보세요.</p>

  <footer>브라우저에서 직접 처리 — 파일이 서버로 전송되지 않습니다 · v1.0.27</footer>

  <script type="module">
    import { convertNWCToMusicXML, parseNWC } from './nwc-viewer/lib/nwc2xml/index.js';

    // ── MIDI writer ─────────────────────────────────────────────────────────

    const STEP_SEMITONES = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };

    function stepToMidi(step, octave, alter) {
      return (octave + 1) * 12 + (STEP_SEMITONES[step] ?? 0) + Math.round(alter ?? 0);
    }

    function encodeVLQ(v) {
      if (v < 0) v = 0;
      const b = [v & 0x7F];
      v >>= 7;
      while (v > 0) { b.unshift((v & 0x7F) | 0x80); v >>= 7; }
      return b;
    }

    function u16be(v) { return [(v >>> 8) & 0xFF, v & 0xFF]; }
    function u32be(v) { return [(v>>>24)&0xFF, (v>>>16)&0xFF, (v>>>8)&0xFF, v&0xFF]; }

    function midiChunk(tag, data) {
      return [...tag, ...u32be(data.length), ...data];
    }

    function musicXMLtoMidi(xmlStr) {
      const PPQ = 480;
      const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');

      // Tempo: prefer <sound tempo="…">, fall back to <per-minute>
      let tempoUs = 500000;
      const soundEl = doc.querySelector('sound[tempo]');
      if (soundEl) tempoUs = Math.round(60_000_000 / parseFloat(soundEl.getAttribute('tempo')));
      else {
        const pmEl = doc.querySelector('per-minute');
        if (pmEl) tempoUs = Math.round(60_000_000 / parseFloat(pmEl.textContent));
      }

      // Time signature
      let tsNum = 4, tsDen = 4;
      const beatsEl = doc.querySelector('time beats');
      const beatTypeEl = doc.querySelector('time beat-type');
      if (beatsEl)    tsNum = parseInt(beatsEl.textContent);
      if (beatTypeEl) tsDen = parseInt(beatTypeEl.textContent);

      const tracks = [];

      // Track 0 – tempo map
      const tu = [(tempoUs>>>16)&0xFF, (tempoUs>>>8)&0xFF, tempoUs&0xFF];
      tracks.push([
        0x00, 0xFF, 0x51, 0x03, ...tu,
        0x00, 0xFF, 0x58, 0x04, tsNum, Math.round(Math.log2(tsDen)), 24, 8,
        0x00, 0xFF, 0x2F, 0x00,
      ]);

      // One track per part
      for (const part of doc.querySelectorAll('part')) {
        const partId = part.getAttribute('id');
        const scorePart = doc.querySelector(`score-part[id="${partId}"]`);

        let channel = 0, program = 0;
        if (scorePart) {
          const ch   = scorePart.querySelector('midi-channel');
          const prog = scorePart.querySelector('midi-program');
          if (ch)   channel = Math.min(15, Math.max(0, parseInt(ch.textContent)   - 1));
          if (prog) program = Math.min(127, Math.max(0, parseInt(prog.textContent) - 1));
        }

        const events = [{ tick: 0, data: [0xC0 | channel, program] }];

        let divisions = 1;
        let position  = 0; // absolute, in MusicXML divisions
        let prevNoteStart = 0;

        for (const measure of part.querySelectorAll('measure')) {
          for (const el of measure.children) {
            switch (el.tagName) {
              case 'attributes': {
                const d = el.querySelector('divisions');
                if (d) divisions = parseInt(d.textContent);
                break;
              }
              case 'note': {
                const isChord = !!el.querySelector('chord');
                const isRest  = !!el.querySelector('rest');
                const dur = parseInt(el.querySelector('duration')?.textContent || '0');

                const noteStart = isChord ? prevNoteStart : position;
                if (!isChord) { prevNoteStart = position; position += dur; }

                if (!isRest && dur > 0) {
                  const pitchEl = el.querySelector('pitch');
                  if (pitchEl) {
                    const step   = pitchEl.querySelector('step')?.textContent   || 'C';
                    const octave = parseInt(pitchEl.querySelector('octave')?.textContent || '4');
                    const alter  = parseFloat(pitchEl.querySelector('alter')?.textContent || '0');
                    const midiNote = stepToMidi(step, octave, alter);

                    if (midiNote >= 0 && midiNote <= 127) {
                      const onTick  = Math.round(noteStart * PPQ / divisions);
                      const offTick = Math.round((noteStart + dur) * PPQ / divisions);
                      events.push({ tick: onTick,  data: [0x90 | channel, midiNote, 80] });
                      events.push({ tick: offTick, data: [0x80 | channel, midiNote, 0]  });
                    }
                  }
                }
                break;
              }
              case 'backup':
                position -= parseInt(el.querySelector('duration')?.textContent || '0');
                break;
              case 'forward':
                position += parseInt(el.querySelector('duration')?.textContent || '0');
                break;
            }
          }
        }

        // Note-offs before note-ons at the same tick
        events.sort((a, b) => a.tick - b.tick || (a.data[0] & 0xF0) - (b.data[0] & 0xF0));

        const trackData = [];
        let lastTick = 0;
        for (const ev of events) {
          trackData.push(...encodeVLQ(ev.tick - lastTick), ...ev.data);
          lastTick = ev.tick;
        }
        trackData.push(0x00, 0xFF, 0x2F, 0x00);
        tracks.push(trackData);
      }

      const header = [
        0x4D,0x54,0x68,0x64, 0x00,0x00,0x00,0x06,
        0x00, 0x01,
        ...u16be(tracks.length),
        ...u16be(PPQ),
      ];
      return new Uint8Array([
        ...header,
        ...tracks.flatMap(t => midiChunk([0x4D,0x54,0x72,0x6B], t)),
      ]);
    }

    // ── UI ──────────────────────────────────────────────────────────────────

    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const loading    = document.getElementById('loading');
    const result     = document.getElementById('result');
    const errorBox   = document.getElementById('error');
    const fileInfo   = document.getElementById('file-info');
    const dlXml      = document.getElementById('download-xml');
    const dlMidi     = document.getElementById('download-midi');
    const openViewer = document.getElementById('open-viewer');

    let currentBuffer = null;
    let currentFilename = null;

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    // Hand the original .nwc bytes to the embedded score viewer via
    // sessionStorage — same-origin auxiliary tabs opened with window.open()
    // / target="_blank" inherit a clone of the opener's sessionStorage.
    openViewer.addEventListener('click', () => {
      if (!currentBuffer || !currentFilename) return;
      try {
        sessionStorage.setItem('nwc_pending_file', JSON.stringify({
          name: currentFilename,
          dataBase64: arrayBufferToBase64(currentBuffer),
        }));
      } catch (err) {
        console.error('뷰어로 파일을 전달하지 못했습니다:', err);
      }
    });

    const blobUrls = [];
    function revokeAll() { blobUrls.forEach(u => URL.revokeObjectURL(u)); blobUrls.length = 0; }
    function mkBlob(data, type) {
      const url = URL.createObjectURL(new Blob([data], { type }));
      blobUrls.push(url);
      return url;
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.nwc')) { showError('.nwc 파일만 지원합니다.'); return; }
      reset();
      loading.classList.add('visible');

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const buffer = e.target.result;
          const xml    = convertNWCToMusicXML(buffer);
          const nwc    = parseNWC(buffer);
          const midi   = musicXMLtoMidi(xml);
          currentBuffer = buffer;
          showResult(file.name, xml, midi, nwc);
        } catch (err) {
          showError('변환 실패: ' + err.message);
        } finally {
          loading.classList.remove('visible');
        }
      };
      reader.onerror = () => { showError('파일을 읽을 수 없습니다.'); loading.classList.remove('visible'); };
      reader.readAsArrayBuffer(file);
    }

    function showResult(filename, xml, midi, nwc) {
      revokeAll();

      currentFilename = filename;

      const base = filename.replace(/\.nwc$/i, '');
      dlXml.href     = mkBlob(xml,  'application/xml');
      dlXml.download = base + '.musicxml';
      dlMidi.href     = mkBlob(midi, 'audio/midi');
      dlMidi.download = base + '.mid';

      const staffCount   = nwc?.staffs?.length ?? '?';
      const measureCount = (xml.match(/<measure/g) || []).length;
      const noteCount    = (xml.match(/<note>/g)   || []).length;

      fileInfo.innerHTML = `
        <span class="label">원본 파일</span> <span class="value">${filename}</span>
        <span class="label">제목</span>       <span class="value">${nwc?.title || '(없음)'}</span>
        <span class="label">파트</span>       <span class="value">${staffCount}개</span>
        <span class="label">마디</span>       <span class="value">${measureCount}개</span>
        <span class="label">음표</span>       <span class="value">${noteCount}개</span>
      `;
      result.classList.add('visible');
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.classList.add('visible'); }
    function reset() {
      result.classList.remove('visible');
      errorBox.classList.remove('visible');
      loading.classList.remove('visible');
    }
  </script>
</body>
</html>
