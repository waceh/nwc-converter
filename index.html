<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NWC Converter & Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .links {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.6rem 1.2rem;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      background: #16161e;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: #7c6af7;
      background: #1a1830;
    }

    .card-icon { font-size: 1.8rem; }
    .card-title { font-weight: 600; }
    .card-desc { font-size: 0.8rem; color: #888; text-align: center; }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>NWC Converter & Viewer</h1>
  <p class="subtitle">NoteWorthy Composer(.nwc) 파일을 브라우저에서 바로 열어보고 변환합니다</p>

  <div class="links">
    <a class="card" href="./viewer/index.html">
      <span class="card-icon">🎼</span>
      <span class="card-title">악보 뷰어</span>
      <span class="card-desc">파일을 열어서 렌더링하고 재생</span>
    </a>
    <a class="card" href="./converter/index.html">
      <span class="card-icon">🔄</span>
      <span class="card-title">변환기</span>
      <span class="card-desc">MusicXML / MIDI로 변환</span>
    </a>
  </div>

  <footer>브라우저에서 직접 처리 — 파일이 서버로 전송되지 않습니다 · v1.0.28</footer>

</body>
</html>
